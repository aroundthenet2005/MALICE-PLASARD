name: Rimljan malice poll

on:
  schedule:
    # GitHub cron runs in UTC; we run both times to cover CET/CEST and gate by Europe/Ljubljana time in code.
    - cron: "10 4 * * 1-5"
    - cron: "10 5 * * 1-5"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run bot
        run: python rimljan_poll.py
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          MENU_URL: ${{ secrets.MENU_URL }}
